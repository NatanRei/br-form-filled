<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>BR Form Filler</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="brand">
      <span class="brand-dot" aria-hidden="true"></span>
      <h1>BR Form Filler</h1>
    </div>
    <button id="rescan" class="icon-btn" title="Reler o formulário" aria-label="Reler o formulário">⟳</button>
  </header>

  <p id="status" class="status status--loading">Lendo formulário…</p>
  <ul id="fields" class="fields"></ul>

  <footer>
    <button id="clearConfig" class="btn btn-ghost">Limpar config.</button>
    <button id="fillBtn" class="btn btn-primary">Preencher</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
